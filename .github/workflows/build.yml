name: Build iOS Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl build-essential fakeroot perl clang-12 lld-12
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-12 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-12 100
      
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
      
      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -LO https://github.com/theos/sdks/releases/download/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz
          rm iPhoneOS14.5.sdk.tar.xz
      
      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          make clean || true
          make package FINALPACKAGE=1
      
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: TelegramEditAnyMessage
          path: packages/*.deb
          if-no-files-found: error
