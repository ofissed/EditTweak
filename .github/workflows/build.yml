name: Build iOS Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl build-essential fakeroot perl clang lld
      
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          cd $HOME/theos
          git submodule update --init --recursive
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
      
      - name: Install Theos toolchain
        run: |
          cd $HOME/theos
          curl -LO https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma
          TMP=$(mktemp -d)
          tar -xvf linux-ios-arm64e-clang-toolchain.tar.lzma -C $TMP
          mkdir -p toolchain/linux/iphone
          mv $TMP/ios-arm64e-clang-toolchain/* toolchain/linux/iphone/
          rm -rf $TMP linux-ios-arm64e-clang-toolchain.tar.lzma
      
      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          curl -LO https://github.com/theos/sdks/releases/download/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz
          rm iPhoneOS14.5.sdk.tar.xz
      
      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          export PATH=$HOME/theos/bin:$PATH
          make clean || true
          make package FINALPACKAGE=1
      
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: TelegramEditAnyMessage
          path: packages/*.deb
          if-no-files-found: error
